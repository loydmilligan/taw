services:
  searxng:
    image: searxng/searxng:latest
    container_name: taw-searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      BASE_URL: http://127.0.0.1:8080/
      INSTANCE_NAME: TAW SearXNG
