<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TAW Bridge</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <h1>TAW Bridge <span id="bridgeVersion" class="version"></span></h1>

      <label>
        Workflow
        <select id="workflowType">
          <option value="research">Research</option>
          <option value="wiki">Wiki</option>
        </select>
      </label>

      <label>
        Research Type
        <select id="researchType">
          <option value="politics">Politics</option>
          <option value="tech">Tech</option>
          <option value="repo">Repo</option>
          <option value="video">Video</option>
        </select>
      </label>

      <section id="wikiSection">
        <label>
          Wiki Topic
          <select id="wikiTopic">
            <option value="">Loading topics…</option>
          </select>
        </label>

        <label id="newTopicLabel">
          New Topic
          <input id="newWikiTopic" type="text" placeholder="Enter new wiki topic" />
        </label>

        <label>
          <input id="wikiAutoIngest" type="checkbox" />
          Auto-ingest immediately without opening TAW
        </label>

        <label>
          <input id="wikiAutoIngestDefault" type="checkbox" />
          Use auto-ingest as the default for wiki sends
        </label>
      </section>

      <label>
        Token
        <input id="token" type="password" placeholder="Bridge token" />
      </label>

      <section class="backend" aria-labelledby="backendTitle">
        <div class="backend-header">
          <h2 id="backendTitle">Search Backend</h2>
          <button id="refreshBackend" type="button" class="secondary">
            Refresh
          </button>
        </div>
        <p id="backendStatus" class="backend-status">Checking SearXNG…</p>
        <p id="backendMeta" class="backend-meta"></p>
        <div class="backend-actions">
          <button id="startBackend" type="button" class="secondary">
            Start
          </button>
          <button id="keepWarm" type="button" class="secondary">
            Keep Warm
          </button>
          <button id="stopBackend" type="button" class="secondary">
            Stop
          </button>
        </div>
      </section>

      <label>
        Working Directory
        <input id="cwd" type="text" placeholder="Optional cwd override" />
      </label>

      <label>
        Initial Question
        <textarea
          id="initialQuestion"
          rows="2"
          placeholder="Optional starting question"
        ></textarea>
      </label>

      <label>
        Note
        <textarea id="note" rows="3" placeholder="Optional note"></textarea>
      </label>

      <div class="actions">
        <button id="sendPage" type="button">Send To Research</button>
        <button id="sendSelection" type="button">Selection To Research</button>
        <button id="sendWiki" type="button" class="secondary">
          Send To Wiki
        </button>
      </div>

      <p id="status" class="status" aria-live="polite"></p>
      <pre id="detail" class="detail"></pre>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
